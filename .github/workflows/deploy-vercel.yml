name: Deploy To Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize Vercel Secrets
        env:
          VERCEL_TOKEN_RAW: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID_RAW: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_RAW: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          sanitize() {
            printf '%s' "$1" \
              | tr -d '\r\n' \
              | sed -E "s/^[[:space:]]+//; s/[[:space:]]+$//; s/^['\"\\]+//; s/['\"\\]+$//"
          }

          echo "VERCEL_TOKEN=$(sanitize \"$VERCEL_TOKEN_RAW\")" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=$(sanitize \"$VERCEL_ORG_ID_RAW\")" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=$(sanitize \"$VERCEL_PROJECT_ID_RAW\")" >> "$GITHUB_ENV"

      - name: Validate Vercel Secrets
        run: |
          [[ -n "$VERCEL_TOKEN" ]] || (echo "Missing VERCEL_TOKEN" && exit 1)
          [[ -n "$VERCEL_ORG_ID" ]] || (echo "Missing VERCEL_ORG_ID" && exit 1)
          [[ -n "$VERCEL_PROJECT_ID" ]] || (echo "Missing VERCEL_PROJECT_ID" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build Project Artifacts
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy To Vercel Production
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
