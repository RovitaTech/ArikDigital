<section class="clients-section">

  <div class="clients-shell">
    <div class="clients-header">
      <p class="clients-label">Vertrauen von starken Marken</p>
    </div>

    <div class="clients-carousel-wrapper">
      <div class="clients-carousel">
        <div class="clients-track">
          @for (client of clients; track client.name) {
            <div class="client-item">
              <span class="client-name">{{ client.text }}</span>
            </div>
          }
          @for (client of clients; track client.name + '_dup') {
            <div class="client-item">
              <span class="client-name">{{ client.text }}</span>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
