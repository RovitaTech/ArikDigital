<footer class="border-t border-white/[0.05] py-10 px-6 bg-gradient-to-b from-[#0A0A0F] to-[#050508]">
  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row items-center justify-between gap-8">
      <div class="flex items-center gap-0">
        <span class="text-[22px] font-['Urbanist'] font-extrabold text-white tracking-tight">Arik</span>
        <span class="text-[22px] font-['Urbanist'] font-extrabold text-[#6C63FF] tracking-tight">Digital</span>
      </div>

      <div class="flex items-center gap-8">
        @for (item of ['Services', 'Pricing', 'Team', 'Contact']; track item) {
          <button
            type="button"
            (click)="scrollToSection(item.toLowerCase())"
            class="text-[#9D9CAA] hover:text-[#6C63FF] transition-colors font-['Urbanist'] text-[14px] font-medium"
          >
            {{ item }}
          </button>
        }
      </div>

      <div class="text-[#5A5968] text-[14px] font-['Urbanist']">© 2026 ArikDigital. All rights reserved.</div>
    </div>
  </div>
</footer>
