<section id="process" class="process-section">
  <div class="process-shell">
    <div class="process-header">
      <div class="process-kicker">HOW WE WORK</div>
      <h2 class="process-title">From consultation to launch in 4 steps</h2>
      <p class="process-subtitle">Our proven process ensures your project is delivered on time and exceeds expectations</p>
    </div>

    <div class="process-container">
      <div class="process-connector"></div>

      <div class="process-grid">
        @for (step of steps; track step.number) {
          <div class="process-step">
            <div class="process-step-circle">
              <span class="process-step-number">{{ step.number }}</span>
            </div>

            <h3 class="process-step-title">{{ step.title }}</h3>
            <p class="process-step-description">{{ step.description }}</p>
          </div>
        }
      </div>
    </div>
  </div>
</section>
